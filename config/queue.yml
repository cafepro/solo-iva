default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    # PDF import / extraction APIs: single thread to avoid parallel quota spikes.
    - queues: pdf_import
      threads: 1
      processes: 1
      polling_interval: 0.1
    - queues: [ default, mailers ]
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
