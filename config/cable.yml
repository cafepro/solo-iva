# solid_cable: los broadcasts llegan a Puma aunque los jobs corran en otro proceso (bin/jobs).
# async solo sirve si jobs y websockets comparten el mismo proceso Ruby.
development:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
