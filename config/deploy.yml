# Kamal deploy — SoloIVA (misma convención que Busca Pagitas / catastro_plus en el VPS).
#
# Sustituir la app anterior en el mismo servidor:
#   1. En el repo de Busca Pagitas: `bin/kamal remove` (o `kamal remove`) para bajar proxy + web + volumen.
#   2. Crea en Docker Hub la imagen `jorgecfmf/solo_iva` si aún no existe.
#   3. En el servidor, PostgreSQL del accessory quedará en un volumen nuevo; si ya tenías Postgres
#      en el host, puedes comentar el accessory y usar DB_HOST apuntando a ese servicio.
#   4. Copia `.kamal/secrets` (o variables en el CI) con RAILS_MASTER_KEY, KAMAL_REGISTRY_PASSWORD,
#      POSTGRES_PASSWORD (misma clave para el contenedor postgres y para Rails).
#   5. Desde este repo: `bin/kamal setup` la primera vez, luego `bin/kamal deploy`.
#
# HTTP en el borde (mismo esquema que Busca Pagitas con proxy.ssl: false). Cuando pongas TLS,
# activa ssl en proxy y RAILS_FORCE_SSL / RAILS_ASSUME_SSL a true.

service: solo_iva

image: jorgecfmf/solo_iva

servers:
  web:
    - 213.165.78.57

proxy:
  ssl: false
  host: 213.165.78.57
  app_port: 3000

registry:
  username: jorgecfmf
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
  clear:
    RAILS_FORCE_SSL: false
    RAILS_ASSUME_SSL: false
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: solo_iva-db
    # Evita ActionDispatch::HostAuthorization con el proxy por IP (ajusta si usas dominio).
    RAILS_ALLOWED_HOSTS: 213.165.78.57

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "solo_iva_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64

ssh:
  user: root

accessories:
  db:
    image: postgres:16-alpine
    host: 213.165.78.57
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: solo_iva
        POSTGRES_DB: solo_iva_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
